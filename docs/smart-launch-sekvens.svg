<svg viewBox="0 0 920 780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="11">
  <title>SMART EHR Launch — Sekvensdiagram v0.7</title>
  <desc>Sekvensdiagram for SMART App Launch IG v2.2.0 EHR Launch-flyt med BFF-mønster og «Signer og send inn»</desc>

  <rect width="920" height="780" fill="#fafafa"/>
  <text x="460" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#212121">SMART EHR Launch — Sekvensdiagram v0.7</text>
  <text x="460" y="38" text-anchor="middle" font-size="10" fill="#757575">SMART App Launch IG v2.2.0 · BFF-mønster · PKCE S256 · «Signer og send inn»</text>

  <!-- ACTORS -->
  <rect x="20" y="48" width="110" height="38" rx="5" fill="#1565c0"/>
  <text x="75" y="63" text-anchor="middle" fill="white" font-weight="bold">EPJ-system</text>
  <text x="75" y="78" text-anchor="middle" fill="#bbdefb" font-size="9">DIPS / tilsvarende</text>
  <line x1="75" y1="86" x2="75" y2="768" stroke="#1565c0" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="170" y="48" width="110" height="38" rx="5" fill="#f57c00"/>
  <text x="225" y="63" text-anchor="middle" fill="white" font-weight="bold">Nettleser</text>
  <text x="225" y="78" text-anchor="middle" fill="#fff8e1" font-size="9">Legens browser</text>
  <line x1="225" y1="86" x2="225" y2="768" stroke="#f57c00" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="320" y="48" width="145" height="38" rx="5" fill="#388e3c"/>
  <text x="392" y="63" text-anchor="middle" fill="white" font-weight="bold">Altinn App (BFF)</text>
  <text x="392" y="78" text-anchor="middle" fill="#c8e6c9" font-size="9">SmartLaunchController</text>
  <line x1="392" y1="86" x2="392" y2="768" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="505" y="48" width="140" height="38" rx="5" fill="#7b1fa2"/>
  <text x="575" y="63" text-anchor="middle" fill="white" font-weight="bold">EPJ Auth Server</text>
  <text x="575" y="78" text-anchor="middle" fill="#e1bee7" font-size="9">SMART Auth / OAuth2</text>
  <line x1="575" y1="86" x2="575" y2="768" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="685" y="48" width="215" height="38" rx="5" fill="#e65100"/>
  <text x="792" y="63" text-anchor="middle" fill="white" font-weight="bold">FHIR + Altinn Platform</text>
  <text x="792" y="78" text-anchor="middle" fill="#ffe0b2" font-size="9">HAPI :8080 / localtest :5101</text>
  <line x1="792" y1="86" x2="792" y2="768" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3"/>

  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1565c0"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f57c00"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#388e3c"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7b1fa2"/></marker>
    <marker id="a5" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e65100"/></marker>
    <marker id="a6" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c62828"/></marker>
  </defs>

  <!-- STEP 1: EHR Launch -->
  <rect x="0" y="96" width="920" height="16" fill="#e3f2fd" opacity="0.6"/>
  <text x="6" y="108" font-size="10" font-weight="bold" fill="#1565c0">① EHR Launch — EPJ starter Altinn-appen med launch-kontekst</text>

  <line x1="75" y1="122" x2="220" y2="122" stroke="#1565c0" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="148" y="118" text-anchor="middle" fill="#1565c0" font-size="9">Redirect browser til</text>
  <text x="148" y="130" text-anchor="middle" fill="#1565c0" font-size="9">/smart/launch?iss=&lt;FHIR URL&gt;&amp;launch=enc-xxx</text>
  <line x1="225" y1="146" x2="387" y2="146" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="306" y="142" text-anchor="middle" fill="#388e3c" font-size="9">GET /smart/launch?iss&amp;launch</text>

  <!-- STEP 2: Discovery -->
  <rect x="0" y="158" width="920" height="16" fill="#f3e5f5" opacity="0.6"/>
  <text x="6" y="170" font-size="10" font-weight="bold" fill="#6a1b9a">② Discovery — hent SMART metadata fra EPJ</text>

  <line x1="392" y1="184" x2="787" y2="184" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="589" y="180" text-anchor="middle" fill="#388e3c" font-size="9">GET {iss}/.well-known/smart-configuration</text>
  <line x1="787" y1="198" x2="397" y2="198" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="589" y="208" text-anchor="middle" fill="#e65100" font-size="9">{ authorization_endpoint, token_endpoint, capabilities }</text>

  <!-- STEP 3: PKCE -->
  <rect x="0" y="220" width="920" height="16" fill="#e8f5e9" opacity="0.6"/>
  <text x="6" y="232" font-size="10" font-weight="bold" fill="#2e7d32">③ PKCE S256 + State — genereres og lagres server-side</text>

  <rect x="347" y="240" width="90" height="28" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="392" y="252" text-anchor="middle" fill="#2e7d32" font-size="9">code_verifier →</text>
  <text x="392" y="262" text-anchor="middle" fill="#2e7d32" font-size="9">code_challenge (S256)</text>

  <line x1="392" y1="272" x2="230" y2="272" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="311" y="268" text-anchor="middle" fill="#388e3c" font-size="9">Redirect → /authorize?response_type=code&amp;code_challenge&amp;state&amp;launch</text>

  <!-- STEP 4: Auth -->
  <rect x="0" y="284" width="920" height="16" fill="#fce4ec" opacity="0.6"/>
  <text x="6" y="296" font-size="10" font-weight="bold" fill="#880e4f">④ Autorisasjon — EPJ Auth utsteder kode</text>

  <line x1="225" y1="310" x2="570" y2="310" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="397" y="306" text-anchor="middle" fill="#7b1fa2" font-size="9">GET /authorize?... (nettleser)</text>
  <line x1="570" y1="326" x2="230" y2="326" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <text x="397" y="322" text-anchor="middle" fill="#7b1fa2" font-size="9">Redirect → /smart/callback?code=…&amp;state=…</text>

  <!-- STEP 5: Token exchange -->
  <rect x="0" y="338" width="920" height="16" fill="#e8f5e9" opacity="0.6"/>
  <text x="6" y="350" font-size="10" font-weight="bold" fill="#1b5e20">⑤ Token-utveksling — server-side (BFF — token forlater aldri nettleseren)</text>

  <line x1="225" y1="364" x2="387" y2="364" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="306" y="360" text-anchor="middle" fill="#f57c00" font-size="9">GET /smart/callback?code&amp;state</text>

  <rect x="347" y="372" width="90" height="26" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="392" y="383" text-anchor="middle" fill="#e65100" font-size="9" font-weight="bold">Validerer state</text>
  <text x="392" y="393" text-anchor="middle" fill="#e65100" font-size="9">+ code_verifier</text>

  <line x1="392" y1="402" x2="570" y2="402" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="481" y="398" text-anchor="middle" fill="#388e3c" font-size="9">POST /token { code, code_verifier, … }</text>
  <line x1="570" y1="418" x2="397" y2="418" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="481" y="414" text-anchor="middle" fill="#7b1fa2" font-size="9">{ access_token, patient, encounter, fhirUser }</text>

  <rect x="347" y="424" width="90" height="18" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="392" y="436" text-anchor="middle" fill="#1b5e20" font-size="9">token → sesjon (BFF)</text>

  <line x1="392" y1="446" x2="230" y2="446" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="311" y="442" text-anchor="middle" fill="#388e3c" font-size="9">Redirect → /{org}/{app}  (session-cookie settes)</text>

  <!-- STEP 6: FHIR prefill -->
  <rect x="0" y="458" width="920" height="16" fill="#fff3e0" opacity="0.7"/>
  <text x="6" y="470" font-size="10" font-weight="bold" fill="#bf360c">⑥ FHIR-prefill — FhirPrefillService henter ressurser server-side</text>

  <line x1="225" y1="484" x2="387" y2="484" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="306" y="480" text-anchor="middle" fill="#f57c00" font-size="9">GET /data/{dataId}  (Altinn frontend)</text>

  <line x1="392" y1="498" x2="787" y2="498" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="589" y="494" text-anchor="middle" fill="#388e3c" font-size="9">GET /fhir/Patient/{id}</text>
  <line x1="392" y1="514" x2="787" y2="514" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="589" y="510" text-anchor="middle" fill="#388e3c" font-size="9">GET /fhir/Practitioner/{id}  (fra fhirUser JWT-claim)</text>
  <line x1="392" y1="530" x2="787" y2="530" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="589" y="526" text-anchor="middle" fill="#388e3c" font-size="9">GET /fhir/Encounter/{id}, /fhir/Organization/{id}</text>
  <line x1="787" y1="546" x2="397" y2="546" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="589" y="556" text-anchor="middle" fill="#e65100" font-size="9">FHIR-ressurser → ForerLegeerklaeringModel (prefyllt)</text>

  <line x1="392" y1="562" x2="230" y2="562" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="311" y="558" text-anchor="middle" fill="#388e3c" font-size="9">Forhåndsutfylt skjema</text>

  <!-- STEP 7: Signering og innsending -->
  <rect x="0" y="574" width="920" height="16" fill="#fce4ec" opacity="0.6"/>
  <text x="6" y="586" font-size="10" font-weight="bold" fill="#880e4f">⑦ Signering og innsending — «Signer og send inn» (Task_1: signing)</text>

  <line x1="225" y1="600" x2="387" y2="600" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="306" y="596" text-anchor="middle" fill="#f57c00" font-size="9">Legen trykker «Signer og send inn»</text>

  <line x1="392" y1="616" x2="787" y2="616" stroke="#c62828" stroke-width="2" marker-end="url(#a6)"/>
  <text x="589" y="612" text-anchor="middle" fill="#c62828" font-size="9">POST /process/next  { action: "sign" }</text>
  <text x="589" y="628" text-anchor="middle" fill="#c62828" font-size="9">sign-aksjon oppretter signatur-dataElement (allowedContributors: app:owned)</text>

  <line x1="787" y1="636" x2="397" y2="636" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="589" y="648" text-anchor="middle" fill="#c62828" font-size="9">Instans arkivert · PDF generert · prosess avsluttet</text>

  <!-- STEP 8: Writeback (planlagt) -->
  <rect x="0" y="660" width="920" height="16" fill="#eeeeee" opacity="0.8"/>
  <text x="6" y="672" font-size="10" font-weight="bold" fill="#757575">⑧ Writeback (planlagt) — PDF tilbake til EPJ</text>

  <line x1="392" y1="686" x2="787" y2="686" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#a5)"/>
  <text x="589" y="682" text-anchor="middle" fill="#9e9e9e" font-size="9">PUT /fhir/DocumentReference  (ikke implementert — fase 2)</text>

  <!-- Hurtigstart note -->
  <rect x="10" y="704" width="900" height="60" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="20" y="720" fill="#424242" font-weight="bold" font-size="9">Hurtigstart (/smart/dev-login) — bypasser steg ①–⑤:</text>
  <text x="20" y="735" fill="#616161" font-size="9">EPJ-simulator → /{org}/{app}/smart/dev-login?userId=12345&amp;partyId=512345&amp;patientId=…&amp;encounterId=…</text>
  <text x="20" y="749" fill="#616161" font-size="9">BFF henter JWT fra localtest server-to-server (GET localhost:5101/Home/GetTestUserToken/{userId}), setter cookies, redirecter til skjema</text>
  <text x="20" y="763" fill="#9e9e9e" font-size="8">Kun tilgjengelig i Development-miljø (IsDevelopment()-sjekk). Steg ⑥–⑦ kjøres som normalt.</text>
</svg>
