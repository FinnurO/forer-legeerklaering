<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="11">
  <title>SMART on FHIR EHR Launch — Sekvensdiagram v0.6</title>
  <desc>Sekvensdiagram for SMART App Launch IG v2.2.0 EHR Launch-flyt</desc>

  <rect width="860" height="620" fill="#fafafa"/>
  <text x="430" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#212121">SMART EHR Launch — Sekvensdiagram v0.6</text>

  <!-- Actors -->
  <!-- Lege/EPJ -->
  <rect x="30" y="40" width="110" height="38" rx="5" fill="#1976d2"/>
  <text x="85" y="55" text-anchor="middle" fill="white" font-weight="bold">EPJ-system</text>
  <text x="85" y="70" text-anchor="middle" fill="#bbdefb" font-size="9">DIPS / tilsvarende</text>
  <line x1="85" y1="78" x2="85" y2="600" stroke="#1976d2" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Nettleser -->
  <rect x="185" y="40" width="110" height="38" rx="5" fill="#f57c00"/>
  <text x="240" y="55" text-anchor="middle" fill="white" font-weight="bold">Nettleser</text>
  <text x="240" y="70" text-anchor="middle" fill="#fff8e1" font-size="9">Legens browser</text>
  <line x1="240" y1="78" x2="240" y2="600" stroke="#f57c00" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Altinn App -->
  <rect x="340" y="40" width="130" height="38" rx="5" fill="#388e3c"/>
  <text x="405" y="55" text-anchor="middle" fill="white" font-weight="bold">Altinn App</text>
  <text x="405" y="70" text-anchor="middle" fill="#c8e6c9" font-size="9">SmartLaunchController</text>
  <line x1="405" y1="78" x2="405" y2="600" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- EPJ Auth Server -->
  <rect x="510" y="40" width="130" height="38" rx="5" fill="#7b1fa2"/>
  <text x="575" y="55" text-anchor="middle" fill="white" font-weight="bold">EPJ Auth Server</text>
  <text x="575" y="70" text-anchor="middle" fill="#e1bee7" font-size="9">SMART Auth / OAuth2</text>
  <line x1="575" y1="78" x2="575" y2="600" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- FHIR Server -->
  <rect x="685" y="40" width="150" height="38" rx="5" fill="#e65100"/>
  <text x="760" y="55" text-anchor="middle" fill="white" font-weight="bold">FHIR Server</text>
  <text x="760" y="70" text-anchor="middle" fill="#ffe0b2" font-size="9">EPJ FHIR R4 API</text>
  <line x1="760" y1="78" x2="760" y2="600" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step labels and arrows -->

  <!-- Step 1: EPJ åpner Altinn-app -->
  <rect x="0" y="90" width="860" height="18" fill="#e3f2fd" opacity="0.5"/>
  <text x="8" y="103" font-size="10" font-weight="bold" fill="#1565c0">① EHR Launch — EPJ starter Altinn-appen</text>
  <line x1="85" y1="118" x2="235" y2="118" stroke="#1976d2" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="160" y="114" text-anchor="middle" fill="#1976d2" font-size="9">Redirect nettleser til</text>
  <text x="160" y="126" text-anchor="middle" fill="#1976d2" font-size="9">/smart/launch?iss=...&amp;launch=...</text>

  <!-- Step 2: Nettleser → Altinn /smart/launch -->
  <line x1="240" y1="145" x2="400" y2="145" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="320" y="141" text-anchor="middle" fill="#f57c00" font-size="9">GET /smart/launch?iss&amp;launch</text>

  <!-- Step 3: Discover SMART config -->
  <rect x="0" y="158" width="860" height="18" fill="#f3e5f5" opacity="0.5"/>
  <text x="8" y="171" font-size="10" font-weight="bold" fill="#6a1b9a">② Discovery — Henter SMART-konfigurasjon</text>
  <line x1="405" y1="185" x2="570" y2="185" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="487" y="181" text-anchor="middle" fill="#388e3c" font-size="9">GET /.well-known/smart-configuration</text>
  <line x1="570" y1="200" x2="410" y2="200" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a4)"/>
  <text x="487" y="196" text-anchor="middle" fill="#7b1fa2" font-size="9">{ authorization_endpoint, token_endpoint }</text>

  <!-- Step 4: PKCE + state, redirect til auth -->
  <rect x="0" y="213" width="860" height="18" fill="#e8f5e9" opacity="0.5"/>
  <text x="8" y="226" font-size="10" font-weight="bold" fill="#2e7d32">③ PKCE — Genererer code_verifier/challenge, lagrer i session</text>
  <rect x="360" y="235" width="90" height="18" rx="3" fill="#388e3c" opacity="0.2"/>
  <text x="405" y="248" text-anchor="middle" fill="#2e7d32" font-size="9">Generer PKCE + state</text>
  <line x1="405" y1="260" x2="235" y2="260" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="320" y="256" text-anchor="middle" fill="#388e3c" font-size="9">Redirect → /auth?response_type=code&amp;...</text>

  <!-- Step 5: Auth server → code -->
  <rect x="0" y="272" width="860" height="18" fill="#fce4ec" opacity="0.5"/>
  <text x="8" y="285" font-size="10" font-weight="bold" fill="#b71c1c">④ Autorisasjon — EPJ Auth utsteder kode</text>
  <line x1="240" y1="300" x2="570" y2="300" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="405" y="296" text-anchor="middle" fill="#f57c00" font-size="9">GET /auth (videresendes av nettleser)</text>
  <line x1="570" y1="315" x2="245" y2="315" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <text x="405" y="311" text-anchor="middle" fill="#7b1fa2" font-size="9">Redirect → /smart/callback?code=...&amp;state=...</text>

  <!-- Step 6: Callback -->
  <rect x="0" y="328" width="860" height="18" fill="#e8f5e9" opacity="0.5"/>
  <text x="8" y="341" font-size="10" font-weight="bold" fill="#2e7d32">⑤ Token-utveksling — server-side, aldri i nettleser</text>
  <line x1="240" y1="356" x2="400" y2="356" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="320" y="352" text-anchor="middle" fill="#f57c00" font-size="9">GET /smart/callback?code&amp;state</text>
  <line x1="405" y1="372" x2="570" y2="372" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="487" y="368" text-anchor="middle" fill="#388e3c" font-size="9">POST /token (code + code_verifier)</text>
  <line x1="570" y1="388" x2="410" y2="388" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a4)"/>
  <text x="487" y="384" text-anchor="middle" fill="#7b1fa2" font-size="9">{ access_token, patient, encounter, fhirUser }</text>
  <rect x="360" y="396" width="90" height="18" rx="3" fill="#388e3c" opacity="0.2"/>
  <text x="405" y="409" text-anchor="middle" fill="#2e7d32" font-size="9">Lagres i server-session</text>

  <!-- Step 7: Redirect til skjema -->
  <line x1="405" y1="422" x2="245" y2="422" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="325" y="418" text-anchor="middle" fill="#388e3c" font-size="9">Redirect → /{org}/{app}</text>

  <!-- Step 8: ProcessDataRead -->
  <rect x="0" y="435" width="860" height="18" fill="#fff8e1" opacity="0.5"/>
  <text x="8" y="448" font-size="10" font-weight="bold" fill="#e65100">⑥ Forhåndsutfylling — IDataProcessor.ProcessDataRead</text>
  <line x1="240" y1="462" x2="400" y2="462" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="320" y="458" text-anchor="middle" fill="#f57c00" font-size="9">GET /data/{dataId} (Altinn frontend)</text>
  <line x1="405" y1="478" x2="755" y2="478" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a6)"/>
  <text x="580" y="474" text-anchor="middle" fill="#388e3c" font-size="9">GET /fhir/Patient/{id}, /Encounter, /Condition</text>
  <line x1="755" y1="493" x2="410" y2="493" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a4)"/>
  <text x="580" y="489" text-anchor="middle" fill="#e65100" font-size="9">FHIR-ressurser (JSON)</text>
  <line x1="405" y1="508" x2="245" y2="508" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="325" y="504" text-anchor="middle" fill="#388e3c" font-size="9">ForerLegeerklaeringModel (utfylt)</text>

  <!-- Step 9: Lege fyller ut og sender inn -->
  <rect x="0" y="520" width="860" height="18" fill="#fce4ec" opacity="0.5"/>
  <text x="8" y="533" font-size="10" font-weight="bold" fill="#b71c1c">⑦ Innsending — Lege kontrollerer og sender</text>
  <line x1="240" y1="548" x2="400" y2="548" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="320" y="544" text-anchor="middle" fill="#f57c00" font-size="9">POST submit</text>
  <line x1="405" y1="563" x2="245" y2="563" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a2)"/>
  <text x="325" y="559" text-anchor="middle" fill="#388e3c" font-size="9">PDF-kvittering</text>

  <!-- Defs for arrows -->
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1976d2"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f57c00"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#388e3c"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7b1fa2"/></marker>
    <marker id="a5" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f57c00"/></marker>
    <marker id="a6" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e65100"/></marker>
  </defs>
</svg>
